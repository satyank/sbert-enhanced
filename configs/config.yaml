model:
  base_model: "bert-base-uncased"
  pooling_strategy: "mean"
  hidden_size: 768

training:
  batch_size: 64
  learning_rate: 0.00002
  epochs: 4
  warmup_steps: 10000
  seed: 26
  max_seq_length: 128
  save_dir: "/content/drive/MyDrive/sbert-experiments/"
  max_train_samples: null
  save_best_only: false
  multitask:
    enabled: false
    lambda_weight: 0.5
    lambda_values_to_try: [0.1, 0.3, 0.5, 0.7, 0.9]
  triplet_margin: 1.0

evaluation:
  benchmarks:
    - "STS12"
    - "STS13"
    - "STS14"
    - "STS15"
    - "STS16"
    - "STSBenchmark"
    - "SICK-R"
  metric: "spearman"
  max_eval_samples: null

data:
  nli_datasets:
    - "snli"
    - "multi_nli"
  sts_dataset: "stsb_multi_mt"
  cache_dir: "data/cache"